<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-bind com style e class </title>
    <style>
        .red {
            color: red;
        }

        .green {
            color: green;
        }

        .blue {
            color: blue;
        }
    </style>
</head>

<body>

    <div id="app">

        <p :class="{red: isRed , green: isGreen}" :style="{fontSize:fontSize + 'px'}">
            Texto estilizado dinamicamente
        </p>

        <button @click="toggleClass">Alterar Classe</button>
        <button @click="incrementarFontSize">Aumentar Fonte</button>

    </div>


</body>
<script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
<script src="script.js"></script>

</html>
